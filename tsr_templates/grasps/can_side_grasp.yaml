name: Can Side Grasp
description: |
  Side grasp for cylindrical can with Robotiq 2F-140.
  Full 360° rotation (can is symmetric).
  Vertical tolerance for grasp height.
  Small roll/pitch tolerance (±15°) for approach angle flexibility.

  TSR convention: gripper z = approach (toward can), gripper y = finger opening.
  Note: Robotiq 2F-140 has internal -90° z rotation, so poses need compensation
  (see geodude_assets issue #5).

task: grasp
subject: robotiq_2f140
reference: can

position:
  type: cylinder
  axis: z
  radius: 0.033
  height: [0.02, 0.10]
  angle: [0, 360]

orientation:
  approach: radial
  roll: [-15, 15]
  pitch: [-15, 15]

# Standoff: distance from grasp point to gripper mount frame.
# Robotiq finger pads are ~10cm from mount, so standoff=0.12 puts
# pads ~2cm outside the can surface (pre-grasp clearance).
standoff: 0.12

gripper:
  aperture: 0.08
