name: Can Side Grasp
description: |
  Side grasp for cylindrical can with Robotiq 2F-140.
  Cylindrical shell TSR: radial tolerance allows gripper closer/farther from can.
  Full 360° rotation (can is symmetric).
  Vertical tolerance for grasp height around can center.
  Small roll/pitch tolerance (±15°) for approach angle flexibility.

  Frame convention: Object origin at geometric center (matches MuJoCo body frame).
  Gripper convention: z = approach (toward can), y = finger opening.
  Note: Robotiq 2F-140 has internal -90° z rotation, so poses need compensation
  (see geodude_assets issue #5).

task: grasp
subject: robotiq_2f140
reference: can

position:
  type: shell  # Thick-walled cylinder for radial tolerance
  axis: z
  radius: [0.0, 0.072]  # Cylindrical shell: can go all the way to center, outer limit doubled
  height: [-0.03, 0.03]  # Grasp zone: ±3cm around object center
  angle: [0, 360]

orientation:
  approach: radial
  roll: [-15, 15]
  pitch: [-15, 15]

# Standoff: distance from can surface to gripper mount frame.
# Robotiq 2F-140 finger pads are ~18.8cm from mount along approach axis.
# For grasp: standoff = 0.188 puts pads at can surface.
# For pre-grasp clearance (~2cm): standoff = 0.21
standoff: 0.19

gripper:
  aperture: 0.08
