name: Can Side Grasp (Flipped)
description: |
  Side grasp for cylindrical can with Robotiq 2F-140 - gripper rotated 180°.
  Use this grasp to pick up the can for placing it upside-down.
  Full 360° rotation around can (can is symmetric).
  Vertical tolerance for grasp height.
  Small roll/pitch tolerance (±15°) for approach angle flexibility.

  TSR convention: gripper z = approach (toward can), gripper y = finger opening.
  Note: Robotiq 2F-140 has internal -90° z rotation, so poses need compensation
  (see geodude_assets issue #5).

task: grasp
subject: robotiq_2f140
reference: can

position:
  type: shell  # Thick-walled cylinder for radial tolerance
  axis: z
  radius: [0.0, 0.072]  # Cylindrical shell: can go all the way to center, outer limit doubled
  height: [-0.03, 0.03]  # Grasp zone: ±3cm around object center
  angle: [0, 360]

orientation:
  approach: radial
  roll: [165, 195]  # 180° ± 15° - gripper flipped upside-down
  pitch: [-15, 15]

# Standoff: distance from grasp point to gripper mount frame.
# Robotiq finger pads are ~10cm from mount, so standoff=0.12 puts
# pads ~2cm outside the can surface (pre-grasp clearance).
standoff: 0.12

gripper:
  aperture: 0.08
